target-version = "py311"
line-length = 100
extend-exclude = ["frontend", "go-daemon", "data", ".venv", "venv", "build", "*.egg-info"]

[lint]
# Pyflakes (F) + pycodestyle (E/W): catches unused imports, undefined names,
# and style issues. E501 (line length) is left to the formatter.
select = ["E", "F", "W"]
ignore = ["E501"]

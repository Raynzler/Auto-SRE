version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    # Ensure your Dockerfile exposes port 8000

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api
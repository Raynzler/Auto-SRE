# Auto-provisioned Prometheus datasource. The fixed uid 'prometheus' is what
# every dashboard panel references, so no manual datasource setup is needed.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s

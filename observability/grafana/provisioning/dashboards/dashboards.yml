# Dashboard provider: loads every JSON model from /etc/grafana/dashboards on
# startup and keeps watching for changes. No manual import, ever.
apiVersion: 1

providers:
  - name: AutoSRE
    orgId: 1
    folder: AutoSRE
    type: file
    disableDeletion: false
    updateIntervalSeconds: 15
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false

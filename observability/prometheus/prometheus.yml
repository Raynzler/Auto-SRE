#Prometheus Config
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Recording rules (SLIs, SLO/error budget) and symptom-based alert rules.
# Split across rules/ and alerts/ so each concern lives in its own file.
rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/alerts/*.yml

# Notification routing is delivered via Alertmanager (next phase). Until then
# alerts are visible in the Prometheus UI at /alerts. Uncomment to wire it up:
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # Each service is a separate job so it appears independently in Prometheus,
  # Grafana (via the $job variable), and alerting (via the job label).
  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'auth'
    static_configs:
      - targets: ['auth:8001']

  - job_name: 'worker'
    static_configs:
      - targets: ['worker:8002']

  # Go network observability daemon (DNS/TCP/HTTP probes -> network_* metrics).
  - job_name: 'network-daemon'
    static_configs:
      - targets: ['network-daemon:2112']

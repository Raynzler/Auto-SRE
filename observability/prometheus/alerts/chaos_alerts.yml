# Chaos awareness: not a failure in itself, but degraded SLIs during an active
# experiment should be attributable. Informational severity by design.
groups:
  - name: chaos_alerts
    rules:
      - alert: ChaosModeActive
        expr: max by (job) (chaos_active) > 0
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "Chaos engineering mode active on {{ $labels.job }}"
          description: >-
            One or more chaos modes are active on '{{ $labels.job }}'. Degraded
            SLIs (latency/errors) during this window are expected — confirm this
            is an intentional experiment before treating downstream alerts as a
            real incident.
          runbook_url: "https://runbooks.example.com/autosre/chaos-active"
